<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки — Качки в Иркутске</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/profile.css">
  <link rel="stylesheet" href="../partials/heder.css">
  <link rel="stylesheet" href="../partials/futer.css">
  <link rel="stylesheet" href="../partials/mob-futer.css">
</head>
<body data-page="profile">
  <div id="site-heder"></div>

  <main class="pg">
    <div class="prof-wrap">
      <aside class="prof-side">
        <p class="prof-side__ttl">Меню профиля</p>
        <nav class="prof-side__nav" aria-label="Меню профиля">
          <a class="prof-side__lnk" href="profile.html">Обзор</a>
          <a class="prof-side__lnk is-active" href="profile-settings.html">Настройки</a>
          <a class="prof-side__lnk" href="#">Достижения</a>
          <a class="prof-side__lnk" href="#">История</a>
          <a class="prof-side__lnk prof-side__lnk--sup" href="#">Поддержка</a>
          <button class="prof-side__lnk" type="button" id="prof-out">Выйти</button>
        </nav>
      </aside>

      <div class="prof-main">
        <h1 class="prof-set__ttl">Настройки профиля</h1>
        <form class="prof-set__form" id="prof-set-form">
          <div class="prof-set__fld">
            <label for="set-gym">Зал</label>
            <input id="set-gym" name="gym_name" type="text" placeholder="PLATOXA GYM" autocomplete="organization">
          </div>
          <div class="prof-set__fld">
            <label for="set-city">Город</label>
            <input id="set-city" name="city" type="text" placeholder="Иркутск" autocomplete="address-level2">
          </div>
          <div class="prof-set__fld">
            <label for="set-weight">Весовая категория (кг)</label>
            <input id="set-weight" name="weight_class" type="number" min="40" max="200" placeholder="83">
          </div>
          <p class="prof-set__msg" id="set-msg" hidden></p>
          <button class="prof-set__btn" type="submit">Сохранить</button>
        </form>
      </div>
    </div>
  </main>

  <div id="site-futer"></div>
  <div id="site-mob-fut"></div>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/profile-settings.js"></script>
</body>
</html>
