<!DOCTYPE html>
<html lang="ru">
<head>

  <title>Загрузка — Качки в Иркутске</title>
  <link rel="stylesheet" href="../css/loading.css">
</head>
<body class="load">
  <div class="load__box">
    <img class="load__ico" src="../images/logo.png" alt="">

    <div class="load__row">
      <img class="load__txt" src="../images/footer-logo-text.png" alt="Качки в Иркутске">

      <div class="load__prog-wrap">

          <span class="load__prog-fill" id="load-fill"></span>

        <span class="load__pct" id="load-pct">%0</span>
      </div>
    </div>
  </div>

  <script src="../js/loading.js"></script>

</html>
