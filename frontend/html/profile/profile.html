<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Качки в Иркутске</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/profile/profile.css">
  <link rel="stylesheet" href="../../partials/heder.css">
  <link rel="stylesheet" href="../../partials/futer.css">
  <link rel="stylesheet" href="../../partials/mob-futer.css">
</head>
<body data-page="profile" data-prof-tab="overview">
  <div id="site-heder"></div>

  <main class="pg">
    <div class="prof-wrap">
      <aside class="prof-side" id="prof-side"></aside>

      <div class="prof-main">
        <header class="prof-head">
          <div class="prof-head__ava">💪</div>
          <div>
            <h1 class="prof-head__name" id="prof-name">—</h1>
            <p class="prof-head__meta" id="prof-meta">—</p>
            <div class="prof-head__tags">
              <span class="prof-tag prof-tag--since" id="prof-since">Участник с —</span>
            </div>
          </div>
        </header>

        <section class="prof-stats">
          <h2 class="prof-sec-ttl">Личные показатели</h2>
          <div class="prof-stats__grid">
            <article class="prof-stat">
              <strong>—</strong>
              <span>Жим лёжа</span>
            </article>
            <article class="prof-stat">
              <strong class="prof-stat__plain">—</strong>
              <span>Подтягиваний</span>
            </article>
            <article class="prof-stat">
              <strong class="prof-stat__plain">—</strong>
              <span>комплекс</span>
            </article>
          </div>
        </section>

        <section class="prof-chart">
          <h2 class="prof-sec-ttl">Прогресс за 6 мес.</h2>
          <p class="prof-empty">Нет данных — добавь результат в показателях</p>
        </section>

        <section class="prof-rec">
          <h2 class="prof-sec-ttl">Рекорды</h2>
          <p class="prof-empty">Пока пусто</p>
        </section>

        <section class="prof-act">
          <h2 class="prof-sec-ttl">Последняя активность</h2>
          <p class="prof-empty">Пока пусто</p>
        </section>
      </div>
    </div>
  </main>

  <div id="site-futer"></div>
  <div id="site-mob-fut"></div>
  <script src="../../js/api.js"></script>
  <script src="../../js/layout.js"></script>
  <script src="../../js/profile/profile-common.js"></script>
  <script src="../../js/profile/profile.js"></script>
</body>
</html>
